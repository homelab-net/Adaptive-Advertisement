# Mosquitto 2.x configuration — on-device sidecar broker (MQTT v5.0)
# Locked platform: Eclipse Mosquitto 2.x (decisions/2026-03-23-mqtt-broker.md)

# Listen on standard MQTT port, localhost/docker-network only.
listener 1883 0.0.0.0

# MQTT v5.0 protocol (our services use MQTT v5).
# Mosquitto 2.x supports v3.1.1 and v5.0 simultaneously; no explicit protocol pin needed.

# Allow anonymous connections on the local appliance network.
# Remote admin is WireGuard-only (ICD-NET-1) — no public exposure.
allow_anonymous true

# Persistence: retain state across container restarts.
persistence true
persistence_location /mosquitto/data/

# Log to stdout (structured log aggregation).
log_dest stdout
log_type all

# Message size limit — audience-state observations are small JSON (~1 kB).
message_size_limit 65536
