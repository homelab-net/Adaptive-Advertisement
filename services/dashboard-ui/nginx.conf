server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── API proxy ──────────────────────────────────────────────────────────
    # Forward /api/* to the dashboard-api service.
    # In docker-compose the service is named "dashboard-api" on port 8000.
    location /api/ {
        proxy_pass         http://dashboard-api:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Increase timeouts for file uploads
        proxy_read_timeout  120s;
        proxy_send_timeout  120s;
        client_max_body_size 256m;
    }

    # ── SPA fallback ───────────────────────────────────────────────────────
    # All other requests return index.html so React Router handles routing.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Static asset caching ───────────────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Health check ───────────────────────────────────────────────────────
    location /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
