name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

# Cancel superseded runs on the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Contract tests — validate all ICD JSON schemas directly (no service deps)
  # ---------------------------------------------------------------------------
  contract-tests:
    name: Contract tests (all ICDs)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install test deps
        run: pip install jsonschema>=4.21 pytest>=8.0

      - name: Run contract tests
        run: python -m pytest tests/contract/ -v --tb=short

  # ---------------------------------------------------------------------------
  # Unit tests — one job per service
  # ---------------------------------------------------------------------------
  unit-tests:
    name: Unit tests — ${{ matrix.service }}
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: input-cv
            path: services/input-cv
            extra_deps: "pytest>=8.2 pytest-timeout>=2.3 freezegun>=1.5"

          - service: audience-state
            path: services/audience-state
            extra_deps: "pytest>=8.0 pytest-asyncio>=0.23"

          - service: decision-optimizer
            path: services/decision-optimizer
            extra_deps: "pytest>=8.0 pytest-asyncio>=0.23"

          - service: player
            path: services/player
            extra_deps: "pytest>=8.0 pytest-asyncio>=0.23"

          - service: creative
            path: services/creative
            extra_deps: "pytest>=8.0 pytest-asyncio>=0.23"

          - service: supervisor
            path: services/supervisor
            extra_deps: "pytest>=8.0 pytest-asyncio>=0.23 aiohttp>=3.9"

          - service: dashboard-api
            path: services/dashboard-api
            extra_deps: "pytest>=8.0 pytest-asyncio>=0.23 httpx>=0.27 aiosqlite>=0.20 alembic>=1.13"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install shared utilities
        run: pip install -e services/shared

      - name: Install ${{ matrix.service }} and test deps
        working-directory: ${{ matrix.path }}
        run: pip install -e "." ${{ matrix.extra_deps }}

      - name: Run unit tests
        working-directory: ${{ matrix.path }}
        env:
          RENDERER_BACKEND: stub   # player: use stub renderer, not mpv
        run: python -m pytest tests/ -v --tb=short

  # ---------------------------------------------------------------------------
  # dashboard-api postgres migration tests — requires real PostgreSQL
  # ---------------------------------------------------------------------------
  dashboard-api-postgres:
    name: dashboard-api postgres migrations (ICD-7)
    runs-on: ubuntu-22.04
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: dashboard
          POSTGRES_PASSWORD: dashboard
          POSTGRES_DB: dashboard_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U dashboard"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dashboard-api and test deps
        working-directory: services/dashboard-api
        run: pip install -e "." pytest>=8.0 pytest-asyncio>=0.23 alembic>=1.13 asyncpg>=0.29

      - name: Run postgres migration tests
        working-directory: services/dashboard-api
        env:
          DASHBOARD_POSTGRES_TEST_URL: "postgresql+asyncpg://dashboard:dashboard@localhost:5432/dashboard_test"
        run: python -m pytest tests/test_postgres_migration.py -v --tb=short

  # ---------------------------------------------------------------------------
  # Integration tests — all services installed in-process, no Docker
  # ---------------------------------------------------------------------------
  integration-tests:
    name: Integration tests
    runs-on: ubuntu-22.04
    needs: [contract-tests, unit-tests]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install all service packages
        run: |
          pip install \
            -e services/shared \
            -e services/input-cv \
            -e services/audience-state \
            -e services/decision-optimizer \
            -e services/player \
            -e services/creative \
            -e services/supervisor

      - name: Install integration test deps
        run: |
          pip install \
            pytest>=8.0 \
            pytest-asyncio>=0.23 \
            aiohttp>=3.9 \
            jsonschema>=4.21

      - name: Run integration tests
        env:
          RENDERER_BACKEND: stub
        # Root pyproject.toml sets asyncio_mode=auto required by ICD-4 e2e tests
        run: python -m pytest tests/integration/ -v --tb=short

  # ---------------------------------------------------------------------------
  # Golden-image hygiene — no hardcoded secrets, IPs, or placeholder tokens
  # ---------------------------------------------------------------------------
  hygiene-tests:
    name: Golden-image hygiene (no hardcoded values)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install test deps
        run: pip install pytest>=8.0 pydantic-settings>=2.0

      - name: Run hardcoded-value gate
        run: python -m pytest tests/test_no_hardcoded_values.py -v --tb=short

  # ---------------------------------------------------------------------------
  # Docker image build validation — catches Dockerfile regressions before hardware
  # ---------------------------------------------------------------------------
  build-images:
    name: Docker image build validation
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build all service images in parallel using compose.
      # Uses RENDERER_BACKEND=stub so no GPU or display is required.
      # Excludes input-cv: its base image (nvcr.io/nvidia/deepstream-l4t) is
      # not available for x86_64; it is validated on the target Jetson hardware.
      - name: Build service images (excluding input-cv)
        env:
          RENDERER_BACKEND: stub
        run: |
          docker compose build \
            mosquitto \
            postgres \
            audience-state \
            creative \
            decision-optimizer \
            player \
            supervisor \
            dashboard-api \
            dashboard-ui
